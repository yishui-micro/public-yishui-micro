name: 公告列表抓取并生成批次

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "日期范围，支持 2019~2025 / 202601~202603 / 20260401~20260404；留空时默认当天到当天"
        required: false
        default: ""
        type: string
      high_only:
        description: "是否只保留高优先级候选"
        required: false
        default: false
        type: boolean
      batch_size:
        description: "每个内容批次的公告数量"
        required: false
        default: "1000"
        type: string
  # schedule:
  #   - cron: "30 10 * * 1-5"

permissions:
  contents: read

concurrency:
  group: announce-fetch-list
  cancel-in-progress: false

jobs:
  fetch-list:
    runs-on: ubuntu-latest
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      INPUT_DATE_RANGE: ${{ github.event.inputs.date_range || '' }}
      INPUT_HIGH_ONLY: ${{ github.event.inputs.high_only || 'false' }}
      INPUT_BATCH_SIZE: ${{ github.event.inputs.batch_size || '1000' }}
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.CODE_GITHUB_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: my-stock-src/pyproject.toml

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Resolve runtime roots
        run: |
          python -m my_stock announce write-runtime-roots

      - name: Resolve date range
        id: range
        shell: bash
        run: |
          python -m my_stock announce resolve-date-range --date-range "${INPUT_DATE_RANGE}"

      - name: Check trading-day coverage
        id: trade_guard
        shell: bash
        run: |
          python -m my_stock announce check-trading-day-coverage \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json"

      - name: Report skip reason
        if: steps.trade_guard.outputs.should_run != 'true'
        run: |
          echo "${{ steps.trade_guard.outputs.skip_reason }}"

      - name: Sync required raw repos
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce sync-year-repos \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}"

      - name: Fetch announcement list
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce fetch-list \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --append \
            --no-push \
            --summary-output "${RUNNER_TEMP}/announce-fetch-list-summary.json"

      - name: Commit and push year repos
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce publish-list-summary \
            --summary-path "${RUNNER_TEMP}/announce-fetch-list-summary.json" \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}"

      - name: Upload fetch summary
        if: steps.trade_guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: announce-fetch-list-summary
          path: ${{ runner.temp }}/announce-fetch-list-summary.json
          if-no-files-found: error
          retention-days: 7

      - name: Filter candidates
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce filter-candidates-workflow \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --list-root "${GP_RUNTIME_ROOT}/announce/list" \
            --high-only-text "${INPUT_HIGH_ONLY}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/announce-filter-candidates-summary.json"

      - name: Generate content batches
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce generate-content-batches \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --candidate-root "${GP_RUNTIME_ROOT}/announce/candidates" \
            --batch-size "${INPUT_BATCH_SIZE}" \
            --summary-output "${RUNNER_TEMP}/announce-generate-content-batches-summary.json"

      - name: Commit and push batch files
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce publish-content-batch-summary \
          --summary-path "${RUNNER_TEMP}/announce-generate-content-batches-summary.json"

      - name: Upload batch summary
        if: steps.trade_guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: announce-generate-content-batches-summary
          path: ${{ runner.temp }}/announce-generate-content-batches-summary.json
          if-no-files-found: error
          retention-days: 7

      - name: Trigger content workflow replicas
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce dispatch-replicas
