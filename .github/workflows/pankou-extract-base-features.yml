name: 盘口基础特征生成

on:
  workflow_dispatch:
    inputs:
      date_source:
        description: "日期来源：YYYYMMDD / YYYYMMDD~YYYYMMDD / action-private / 空=当天"
        required: false
        default: ""
        type: string
      max_parallel:
        description: "每轮最大并发 runner 数"
        required: false
        default: "1"
        type: string
      round_index:
        description: "当前轮次索引（自触发用，手动不需填）"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

concurrency:
  group: pankou-extract-base-${{ github.repository_owner }}
  cancel-in-progress: false

# ──────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Prepare: resolve dates for this round ─────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      dates_matrix:    ${{ steps.resolve.outputs.dates_matrix }}
      has_work:        ${{ steps.resolve.outputs.has_work }}
      has_next_round:  ${{ steps.resolve.outputs.has_next_round }}
      total_rounds:    ${{ steps.resolve.outputs.total_rounds }}
      current_round:   ${{ steps.resolve.outputs.current_round }}
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Resolve backfill dates
        id: resolve
        run: |
          python -m my_stock pankou resolve-backfill-dates \
            --date-source "${{ inputs.date_source }}" \
            --round-index "${{ inputs.round_index }}" \
            --max-parallel "${{ inputs.max_parallel }}" \
            --github-output "${GITHUB_OUTPUT}"

  # ── 2. Extract base features (matrix × dates) ───────────────────
  extract-base:
    needs: prepare
    if: needs.prepare.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.dates_matrix) }}
      fail-fast: false
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_GUBEN_REPO: gp-guben
      GP_PANKOU_REPO: gp-pankou
      INPUT_DATE: ${{ matrix.date }}
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      PYTHONUNBUFFERED: "1"
      MY_STOCK_WORKERS: "4"
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Normalize date
        id: date
        run: |
          python -m my_stock common normalize-date \
            --date "${INPUT_DATE}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Sync gp-guben
        run: python -m my_stock common sync-repo gp-guben

      - name: Sync raw date repo
        run: python -m my_stock common sync-repo "${{ steps.date.outputs.iso }}"

      - name: Build base pankou parquet
        run: |
          python -m my_stock pankou extract-base-features \
            --date "${{ steps.date.outputs.compact }}" \
            --data-dir "${GP_REPOS_ROOT}/${{ steps.date.outputs.iso }}" \
            --summary-output "${RUNNER_TEMP}/pankou-extract-base-summary.json"

      - name: Sync gp-pankou
        run: python -m my_stock common sync-repo gp-pankou

      - name: Canonicalize base parquet
        run: |
          python -m my_stock pankou canonicalize-base \
            --date "${{ steps.date.outputs.compact }}" \
            --summary-output "${RUNNER_TEMP}/pankou-canonical-base-summary.json"

      - name: Upload base artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankou-base-${{ steps.date.outputs.compact }}
          path: |
            ${{ env.GP_RUNTIME_ROOT }}/pankou/canonical/gp-pankou/${{ steps.date.outputs.year }}/${{ steps.date.outputs.compact }}.parquet
          if-no-files-found: error
          retention-days: 7

  # ── 3. Collect round: push artifacts to action-private or publish ─
  collect-round:
    needs: [prepare, extract-base]
    if: needs.prepare.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts
          pattern: pankou-base-*

      - name: Collect round results
        run: |
          python -m my_stock pankou collect-round \
            --artifact-dir "${{ runner.temp }}/artifacts" \
            --date-source "${{ inputs.date_source }}" \
            --dates '${{ needs.prepare.outputs.dates_matrix }}'

  # ── 4. Next round: self-trigger if more rounds remain ────────────
  next-round:
    needs: [prepare, collect-round]
    if: needs.prepare.outputs.has_next_round == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      GITHUB_TOKEN: ${{ github.token }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Trigger next round
        run: |
          python -m my_stock pankou trigger-next-round \
            --date-source "${{ inputs.date_source }}" \
            --max-parallel "${{ inputs.max_parallel }}" \
            --current-round "${{ needs.prepare.outputs.current_round }}" \
            --total-rounds "${{ needs.prepare.outputs.total_rounds }}"
