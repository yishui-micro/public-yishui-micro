# 功能：
# - 从按日期 raw 仓读取 `raw/pankou/*.dat`，生成单日基础盘口特征 parquet。
# - 发布前先把 runtime 文件 canonicalize 成旧仓 exact schema，再推回 `larkself/gp-pankou`。
#
# 用法：
# - 该源文件应复制到任意 workflow 副本仓库中运行；副本仓库需要配置主仓 PAT 和数据仓 PAT。
# - 在 GitHub Actions 中通过 `workflow_dispatch` 手动触发，并传入 `date=YYYYMMDD`。
# - 实际命令入口为 `python -m my_stock pankou extract-base-features`
#   和 `python -m my_stock pankou canonicalize-base`，其中代码来自 checkout 下来的 `hiyishui/my-stock`。
name: 盘口基础特征生成

on:
  workflow_dispatch:
    inputs:
      date:
        description: "目标交易日，格式 YYYYMMDD"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pankou-extract-base-${{ inputs.date }}
  cancel-in-progress: false

jobs:
  extract-base:
    runs-on: ubuntu-latest
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_GUBEN_REPO: gp-guben
      GP_PANKOU_REPO: gp-pankou
      INPUT_DATE: ${{ inputs.date }}
      LARKSELF_PAT: ${{ secrets.LARKSELF_PAT }}
      DATA_GITHUB_PAT: ${{ secrets.DATA_GITHUB_PAT }}
      HIYISHUI_PAT: ${{ secrets.HIYISHUI_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.CODE_GITHUB_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT || secrets.CODE_GITHUB_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Normalize date
        id: date
        run: |
          python -m my_stock common normalize-date \
            --date "${INPUT_DATE}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Sync gp-guben
        run: python -m my_stock common sync-repo gp-guben

      - name: Sync raw date repo
        run: python -m my_stock common sync-repo "${{ steps.date.outputs.iso }}"

      - name: Build base pankou parquet
        run: |
          python -m my_stock pankou extract-base-features \
            --date "${{ steps.date.outputs.compact }}" \
            --data-dir "${GP_REPOS_ROOT}/${{ steps.date.outputs.iso }}" \
            --summary-output "${RUNNER_TEMP}/pankou-extract-base-summary.json"

      - name: Sync gp-pankou
        run: python -m my_stock common sync-repo gp-pankou

      - name: Canonicalize base parquet
        run: |
          python -m my_stock pankou canonicalize-base \
            --date "${{ steps.date.outputs.compact }}" \
            --summary-output "${RUNNER_TEMP}/pankou-canonical-base-summary.json"

      - name: Publish base parquet to gp-pankou
        run: python -m my_stock pankou publish-base --date "${{ steps.date.outputs.compact }}"

      - name: Upload base artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankou-base-${{ steps.date.outputs.compact }}
          path: |
            ${{ runner.temp }}/runtime/pankou/base/pankou/${{ steps.date.outputs.year }}/${{ steps.date.outputs.compact }}.parquet
            ${{ runner.temp }}/runtime/pankou/canonical/gp-pankou/${{ steps.date.outputs.year }}/${{ steps.date.outputs.compact }}.parquet
            ${{ runner.temp }}/pankou-extract-base-summary.json
            ${{ runner.temp }}/pankou-canonical-base-summary.json
          if-no-files-found: error
          retention-days: 7
