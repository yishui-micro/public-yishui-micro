name: 公告特征生成

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "日期范围，支持 2019~2025 / 202601~202603 / 20260401~20260404；留空时默认当天到当天"
        required: false
        default: ""
        type: string
  # schedule:
  #   - cron: "35 11 * * 1-5"

permissions:
  contents: read

concurrency:
  group: announce-build-features
  cancel-in-progress: false

jobs:
  build-features:
    runs-on: ubuntu-latest
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      INPUT_DATE_RANGE: ${{ github.event.inputs.date_range || '' }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.CODE_GITHUB_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: my-stock-src/pyproject.toml

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./my-stock-src

      - name: Resolve runtime roots
        run: |
          python -m my_stock announce write-runtime-roots

      - name: Resolve date range
        id: range
        shell: bash
        run: |
          python -m my_stock announce resolve-date-range --date-range "${INPUT_DATE_RANGE}"

      - name: Check trading-day coverage
        id: trade_guard
        shell: bash
        run: |
          python -m my_stock announce check-trading-day-coverage \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json"

      - name: Report skip reason
        if: steps.trade_guard.outputs.should_run != 'true'
        run: |
          echo "${{ steps.trade_guard.outputs.skip_reason }}"

      - name: Sync required data repos
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce sync-feature-repos \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}"

      - name: Build feature files into runtime
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce build-features \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/announce-build-features-summary.json"

      - name: Publish runtime features to gp-announce-features
        if: steps.trade_guard.outputs.should_run == 'true'
        run: |
          python -m my_stock announce publish-feature-summary \
            --summary-path "${RUNNER_TEMP}/announce-build-features-summary.json" \
            --start "${{ steps.range.outputs.start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --max-rows-per-file 800000

      - name: Upload feature summary
        if: steps.trade_guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: announce-build-features-summary
          path: ${{ runner.temp }}/announce-build-features-summary.json
          if-no-files-found: error
          retention-days: 7
